<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frutiger Aero MMO</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        overflow: hidden;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at 25% 20%, #dff8ff 0%, #75aad5 30%, #234866 100%);
      }

      #ui {
        position: fixed;
        top: 12px;
        left: 12px;
        padding: 12px;
        border-radius: 14px;
        background: rgba(19, 38, 53, 0.75);
        border: 1px solid rgba(213, 241, 255, 0.35);
        backdrop-filter: blur(8px);
        color: #e9f7ff;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        width: 260px;
      }

      #ui h1 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      #ui label,
      #ui small {
        display: block;
        margin-top: 8px;
      }

      #ui input {
        width: 100%;
        margin-top: 4px;
        border-radius: 8px;
        border: 1px solid #84b6d6;
        padding: 6px;
        box-sizing: border-box;
      }

      #legend {
        margin-top: 8px;
        font-size: 12px;
        color: #b6d9ee;
      }

      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <aside id="ui">
      <h1>Frutiger Aero MMO</h1>
      <small>WASD / Arrow keys to move.</small>
      <label for="metalColor">Metal Color</label>
      <input id="metalColor" type="color" value="#d7dde2" />
      <label for="nameTag">Name Tag</label>
      <input id="nameTag" type="text" maxlength="20" value="SkyRider" />
      <div id="legend">Third-person multiplayer world with rounded metallic avatars.</div>
    </aside>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="./game.js"></script>
  </body>
</html>
